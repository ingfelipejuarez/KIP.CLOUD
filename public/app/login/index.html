<!DOCTYPE html>
<html lang="es" data-theme="ember">
<head>
  <script src="../../src/kip-stub.js"></script>
  <script>

    (function(){
      var _s=['initNotaPersistence','initArchivePersistence','toggleRegistroPersistente','kipSyncData','kipTrackEvent','kipOnReady','kipAnalytics'];
      _s.forEach(function(n){ if(typeof window[n]==='undefined') window[n]=function(){}; });
      if(typeof window.KIPStore==='undefined') window.KIPStore={_stub:true,getInstance:function(){return null;},getState:function(){return{};},setState:function(){},subscribe:function(){return function(){};} };
    })();
  </script>
  <!-- ── Seguridad ──────────────────────────────────────────────── -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'sha256-6qXmyKna4zeNzi79LlvT4goaMf2vZgB3/j7NmcG5og8=' 'sha256-qR6bvq/9hBKcymCesN7SdOhsTfUFqZy3GfkhKJc8ghg=' 'sha256-wXjOToq1ARdNMzMWNC9DxL1BovYAlG1vLVcIaptUMj4=' 'sha256-Kwowl7K20nIxwXOKmrufaP3444SrxUct8I3tBxLoymM=' 'sha256-vvt4KWwuNr51XfE5m+hzeNEGhiOfZzG97ccfqGsPwvE='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.deepseek.com;">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="KIP — Iniciar sesión" />
  <title>KIP · Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />

  <!-- Anti-FOUC: restaurar tema antes del primer render -->
  <script>
    (function(){
      try {
        var t = localStorage.getItem('kip_tema');
        if (t) document.documentElement.setAttribute('data-theme', t);
      } catch(e) {}
    })();
  </script>
  <style>
    /* ── Login page layout ─────────────────────────────────────── */
    .login-root {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--s6) var(--s4);
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--su);
      border: 1px solid var(--bo);
      border-radius: var(--radius-xl);
      padding: var(--s8) var(--s7);
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: var(--s3);
      margin-bottom: var(--s7);
      text-decoration: none;
    }
    .login-logo__mark {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: var(--a);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .login-logo__name {
      font-family: var(--f-display);
      font-size: 20px;
      font-weight: 800;
      color: var(--tx);
      letter-spacing: -.02em;
    }
    .login-title {
      font-family: var(--f-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--tx);
      margin-bottom: var(--s2);
      letter-spacing: -.02em;
    }
    .login-subtitle {
      font-size: 14px;
      color: var(--tx2);
      margin-bottom: var(--s7);
      line-height: 1.5;
    }
    .login-group {
      margin-bottom: var(--s5);
    }
    .login-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--tx2);
      margin-bottom: var(--s2);
    }
    .login-input {
      width: 100%;
      height: 44px;
      padding: 0 var(--s4);
      font-size: 14px;
      font-family: var(--f-body);
      color: var(--tx);
      background: var(--bg);
      border: 1px solid var(--bo);
      border-radius: var(--radius-lg);
      outline: none;
      transition: border-color .15s;
      box-sizing: border-box;
    }
    .login-input:focus {
      border-color: var(--a);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--a) 15%, transparent);
    }
    .login-input--error {
      border-color: var(--error, #EF4444);
    }
    .login-error {
      display: none;
      font-size: 12px;
      color: var(--error, #EF4444);
      margin-top: var(--s2);
    }
    .login-error.visible { display: block; }
    .login-btn {
      width: 100%;
      height: 44px;
      margin-top: var(--s6);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--f-body);
      color: var(--tx-on-a);
      background: var(--a);
      border: none;
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--s2);
    }
    .login-btn:hover  { opacity: .9; }
    .login-btn:active { transform: scale(.98); }
    .login-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .login-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid color-mix(in srgb, var(--tx-on-a) 30%, transparent);
      border-top-color: var(--tx-on-a);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    .login-btn.loading .login-spinner { display: block; }
    .login-btn.loading .login-btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .login-footer {
      text-align: center;
      margin-top: var(--s5);
      font-size: 12px;
      color: var(--tx3);
    }
    .login-footer a { color: var(--a); text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }
    /* Mock badge — visible cuando KIP_USE_API es false */
    .mock-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--s2);
      font-size: 11px;
      font-weight: 500;
      color: var(--a);
      background: color-mix(in srgb, var(--a) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--a) 25%, transparent);
      border-radius: 100px;
      padding: 3px 10px;
      margin-bottom: var(--s5);
    }
    .mock-badge svg { flex-shrink: 0; }
  </style>
  <!-- HTTPS enforcement: en producción redirigir a HTTPS automáticamente -->
  <script>
    if (location.protocol === 'http:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      location.replace('https:' + location.href.slice(5));
    }
  </script>
  <!-- Open Graph / Social -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://kip.app/app/login/" />
  <meta property="og:site_name"   content="KIP" />
  <meta property="og:title"       content="KIP — Iniciar sesión" />
  <meta property="og:description" content="Accede a tu cuenta de KIP y retoma tus hábitos." />
  <meta property="og:image"       content="https://kip.app/assets/og-image.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:site"        content="@kipapp" />
  <meta name="twitter:title"       content="KIP — Iniciar sesión" />
  <meta name="twitter:description" content="Accede a tu cuenta de KIP y retoma tus hábitos." />
  <meta name="twitter:image"       content="https://kip.app/assets/og-image.png" />
</head>
<body>
<div class="login-root">
  <div class="login-card">

    <a href="../dashboard/" class="login-logo" aria-label="KIP inicio">
      <div class="login-logo__mark">
        <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="7" fill="var(--a)"/>
          <path d="M9 6v16M9 14l5.5-8M9 14l6.5 8"
                stroke="var(--tx-on-a)" stroke-width="2.4"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="login-logo__name">KIP</span>
    </a>

    <p class="login-title">Bienvenido de vuelta</p>
    <p class="login-subtitle">Inicia sesión para seguir con tus hábitos.</p>

    <!-- Badge de modo mock (se oculta en producción via JS) -->
    <div class="mock-badge" id="mock-badge">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.2"/>
        <path d="M5 3v2.5L6.5 7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Modo demo activo
    </div>

    <div class="login-group">
      <label class="login-label" for="login-email">Email</label>
      <input class="login-input" type="email" id="login-email"
             placeholder="tu@email.com" autocomplete="email" />
    </div>

    <div class="login-group">
      <label class="login-label" for="login-password">Contraseña</label>
      <input class="login-input" type="password" id="login-password"
             placeholder="••••••••" autocomplete="current-password" />
    </div>

    <!-- Remember me -->
    <label for="login-remember" style="display:flex;align-items:center;gap:var(--s2);font-size:13px;color:var(--tx-2);margin-bottom:var(--s3);cursor:pointer;user-select:none">
      <input type="checkbox" id="login-remember" style="accent-color:var(--a)" />
      Recordarme en este dispositivo
    </label>

    <p class="login-error" id="login-error" role="alert"></p>
    <p id="reset-success" style="display:none;font-size:12px;color:#34D399;margin-bottom:var(--s3)">✓ Contraseña actualizada. Inicia sesión con tu nueva contraseña.</p>

    <button class="login-btn" id="login-btn" type="button">
      <span class="login-spinner" aria-hidden="true"></span>
      <span class="login-btn-text">Iniciar sesión</span>
    </button>

    <p class="login-footer" style="margin-top:var(--s3)">
      <button type="button" class="login-link-btn" onclick="alert('Recuperación de contraseña disponible próximamente. En modo demo usa cualquier contraseña.')">¿Olvidaste tu contraseña?</button>
    </p>
    <div style="height:1px;background:var(--b-1);margin:var(--s5) 0"></div>
    <p class="login-footer">
      ¿No tienes cuenta?
      <button type="button" class="login-link-btn" onclick="alert('Registro disponible próximamente. En modo demo inicia sesión con cualquier email.')">Crear cuenta gratis</button>
    </p>

  </div>
</div>

<script>if(new URLSearchParams(location.search).get('reset')==='ok'){var el=document.getElementById('reset-success');if(el)el.style.display='block';}</script>
<script type="module" src="./login.js"></script>
</body>
</html>
