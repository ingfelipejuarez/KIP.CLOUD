# ═══════════════════════════════════════════════════════════════════
# KIP · nginx.conf — Producción                        kip.v6-DEBUG
# ═══════════════════════════════════════════════════════════════════
#
# Requisitos:
#   - Nginx >= 1.18
#   - Certificado SSL en /etc/ssl/kip/
#   - Backend en 127.0.0.1:4000
#   - Archivos en /var/www/kip/
#
# Validar: nginx -t && nginx -s reload
#
# Bugs corregidos:
#   [SINTAXIS-01] CSP multi-línea -> un único string
#   [SINTAXIS-02] location anidada -> regex independiente
#   [LOGICA-01]   COEP require-corp bloqueaba Google Fonts -> eliminado
#   [LOGICA-02]   if($method) en server{} -> map + if en location
#   [LOGICA-03]   include proxy_params -> parámetros explícitos
#   [LOGICA-04]   error_page 429/50x -> archivo inexistente -> /app/404/
#   [LOGICA-05]   fallback /index.html -> /app/dashboard/index.html
#   [LOGICA-06]   comentario brotli engañoso -> eliminado
# ═══════════════════════════════════════════════════════════════════

limit_req_zone $binary_remote_addr zone=kip_login_limit:10m   rate=5r/m;
limit_req_zone $binary_remote_addr zone=kip_api_limit:20m     rate=60r/m;
limit_req_zone $binary_remote_addr zone=kip_general_limit:20m rate=200r/m;
limit_conn_zone $binary_remote_addr zone=kip_conn_limit:10m;

log_format kip_json escape=json
    '{"time":"$time_iso8601","ip":"$remote_addr","method":"$request_method",'
    '"uri":"$uri","status":$status,"bytes":$body_bytes_sent,'
    '"ref":"$http_referer","ua":"$http_user_agent","rt":"$request_time"}';

# [LOGICA-02] Map para metodos no estandar — evita 'if' peligroso en server{}
map $request_method $method_not_allowed {
    default  1;
    GET      0;
    POST     0;
    PUT      0;
    PATCH    0;
    DELETE   0;
    OPTIONS  0;
    HEAD     0;
}


# ── HTTP -> HTTPS ───────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name kip.app www.kip.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}


# ── HTTPS principal ─────────────────────────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name kip.app www.kip.app;

    # ── TLS ────────────────────────────────────────────────────────
    ssl_certificate      /etc/ssl/kip/fullchain.pem;
    ssl_certificate_key  /etc/ssl/kip/privkey.pem;
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    ssl_trusted_certificate   /etc/ssl/kip/chain.pem;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout          5s;

    # ── Raiz y logs ────────────────────────────────────────────────
    root  /var/www/kip;
    index index.html;
    access_log /var/log/nginx/kip_access.log kip_json;
    error_log  /var/log/nginx/kip_error.log warn;

    # ── Gzip ───────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml
               font/woff font/woff2;

    # ── Limites globales ───────────────────────────────────────────
    limit_conn        kip_conn_limit 20;
    limit_conn_status 429;
    client_max_body_size    1m;
    client_body_timeout     10s;
    client_header_timeout   10s;
    send_timeout            10s;
    keepalive_timeout       65s;
    keepalive_requests      100;
    proxy_buffering         on;
    proxy_buffer_size       4k;
    proxy_buffers           8 4k;
    proxy_busy_buffers_size 8k;
    server_tokens           off;

    # ── Headers de seguridad ───────────────────────────────────────

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # [SINTAXIS-01] CSP en un unico string — nginx no concatena multi-linea
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.deepseek.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "DENY" always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header X-DNS-Prefetch-Control  "off" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

    # Cross-Origin: COOP si, COEP NO (bloquearia Google Fonts)
    # [LOGICA-01] require-corp eliminado
    add_header Cross-Origin-Opener-Policy   "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site"   always;

    # ── Bloquear rutas sensibles ───────────────────────────────────
    location ~ /\.(env|git|htaccess|htpasswd|DS_Store|npmrc) {
        deny all;
        return 404;
    }
    location ~ /(node_modules|\.github|tests|coverage)/ {
        deny all;
        return 404;
    }
    location ~ \.(config\.js|config\.ts)$ {
        deny all;
        return 404;
    }

    # ── Login — rate limiting maximo ───────────────────────────────
    location = /api/v1/auth/login {
        if ($method_not_allowed) { return 405; }

        limit_req         zone=kip_login_limit burst=3 nodelay;
        limit_conn        kip_conn_limit 2;
        limit_req_status  429;
        limit_conn_status 429;

        add_header Retry-After   "60" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma        "no-cache" always;

        # [LOGICA-03] Parametros explícitos — sin depender de proxy_params
        proxy_pass            http://127.0.0.1:4000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_read_timeout    8s;
        proxy_connect_timeout 5s;
        proxy_hide_header     X-Powered-By;
        proxy_hide_header     Server;
    }

    # ── API backend ────────────────────────────────────────────────
    location /api/v1/ {
        if ($method_not_allowed) { return 405; }

        limit_req        zone=kip_api_limit burst=20 nodelay;
        limit_req_status 429;

        # [LOGICA-03] Parametros explícitos
        proxy_pass            http://127.0.0.1:4000;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade           $http_upgrade;
        proxy_set_header      Connection        "upgrade";
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_hide_header     X-Powered-By;
        proxy_hide_header     Server;
    }

    # ── Manifest / SW — sin cache ──────────────────────────────────
    location ~* (manifest\.json|service-worker\.js|sw\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma        "no-cache" always;
    }

    # ── JS / CSS / Fonts — cache 1 año (immutable) ────────────────
    location ~* \.(js|css|woff|woff2|ttf|otf)$ {
        limit_req zone=kip_general_limit burst=50;
        expires   1y;
        add_header Cache-Control "public, immutable" always;
        add_header Vary          "Accept-Encoding" always;
        access_log off;
    }

    # ── Imagenes — cache 30 dias ───────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        limit_req zone=kip_general_limit burst=50;
        expires   30d;
        add_header Cache-Control "public" always;
        access_log off;
    }

    # ── HTML — sin cache ───────────────────────────────────────────
    # [SINTAXIS-02] location regex independiente — NO anidada dentro de location /
    location ~* \.html$ {
        limit_req zone=kip_general_limit burst=30;
        expires   -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma        "no-cache" always;
        try_files  $uri $uri/ =404;
    }

    # ── SPA fallback ───────────────────────────────────────────────
    location / {
        limit_req zone=kip_general_limit burst=30;
        if ($method_not_allowed) { return 405; }

        # [LOGICA-05] Fallback directo al dashboard — no al index.html raiz
        # que hace redirect via JS (puede fallar si JS esta bloqueado)
        try_files $uri $uri/ $uri/index.html /app/dashboard/index.html;
    }

    # ── Paginas de error ───────────────────────────────────────────
    # [LOGICA-04] Todas apuntan a /app/404/index.html que SI existe
    error_page 404              /app/404/index.html;
    error_page 429              /app/404/index.html;
    error_page 500 502 503 504  /app/404/index.html;

    location = /app/404/index.html {
        internal;
    }
}
